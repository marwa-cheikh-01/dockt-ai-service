<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assistant Médical — Oujda</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            width: 420px;
            height: 680px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header {
            background: linear-gradient(135deg, #0d6e4f, #1a9268);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .header-text h2 {
            color: #fff;
            font-size: 15px;
            font-weight: 600;
        }

        .header-text p {
            color: rgba(255, 255, 255, 0.75);
            font-size: 12px;
            margin-top: 2px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f7f9fb;
        }

        #messages::-webkit-scrollbar {
            width: 4px;
        }

        #messages::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 2px;
        }

        .msg {
            display: flex;
            gap: 8px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .msg.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg.bot {
            align-self: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .avatar.bot-av {
            background: #0d6e4f;
            color: #fff;
        }

        .avatar.user-av {
            background: #e2e8f0;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 13.5px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .msg.bot .bubble {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
            color: #1a202c;
        }

        .msg.user .bubble {
            background: #0d6e4f;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .bubble.blocked {
            background: #fff5f5;
            border-color: #fed7d7;
            color: #c53030;
        }

        .pharma-card {
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: #166534;
        }

        .pharma-card strong {
            font-size: 14px;
            display: block;
            margin-bottom: 4px;
        }

        .pharma-card span {
            display: block;
            color: #4b7a5e;
            font-size: 12px;
            margin-top: 2px;
        }

        .pharma-links {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .pharma-links a {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
        }

        .pharma-links a.maps {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .pharma-links a.waze {
            background: #fef9c3;
            color: #854d0e;
        }

        .source-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 6px;
        }

        .source-live {
            background: #dcfce7;
            color: #166534;
        }

        .source-fallback {
            background: #fef9c3;
            color: #854d0e;
        }

        #quick-btns {
            padding: 8px 14px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            background: #fff;
            border-top: 1px solid #e2e8f0;
        }

        .qbtn {
            background: #f0fdf4;
            color: #0d6e4f;
            border: 1px solid #86efac;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s;
            font-family: inherit;
        }

        .qbtn:hover {
            background: #dcfce7;
        }

        #input-bar {
            padding: 12px 14px;
            display: flex;
            gap: 8px;
            background: #fff;
            border-top: 1px solid #e2e8f0;
        }

        #user-input {
            flex: 1;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 9px 12px;
            font-size: 13.5px;
            font-family: inherit;
            resize: none;
            height: 42px;
            max-height: 120px;
            background: #f7f9fb;
            color: #1a202c;
            outline: none;
            transition: border-color 0.2s;
        }

        #user-input:focus {
            border-color: #0d6e4f;
            background: #fff;
        }

        #send-btn {
            width: 42px;
            height: 42px;
            background: #0d6e4f;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.1s;
            flex-shrink: 0;
        }

        #send-btn:hover {
            background: #1a9268;
        }

        #send-btn:active {
            transform: scale(0.95);
        }

        #send-btn:disabled {
            background: #e2e8f0;
            cursor: not-allowed;
        }

        #send-btn svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            align-items: center;
        }

        .typing span {
            width: 7px;
            height: 7px;
            background: #0d6e4f;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0)
            }

            40% {
                transform: translateY(-6px)
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="header">
            <div class="header-icon">🏥</div>
            <div class="header-text">
                <h2>Assistant Médical — Oujda</h2>
                <p><span class="dot"></span>En ligne · Français / عربي</p>
            </div>
        </div>
        <div id="messages"></div>
        <div id="quick-btns">
            <button class="qbtn" onclick="send('pharmacie de garde')">💊 Pharmacie de garde</button>
            <button class="qbtn" onclick="send('j ai de la fievre')">🌡️ Fièvre</button>
            <button class="qbtn" onclick="send('j ai mal a la tete')">🤕 Maux de tête</button>
            <button class="qbtn" onclick="send('premiers secours coupure')">🩹 Premiers secours</button>
        </div>
        <div id="input-bar">
            <textarea id="user-input" placeholder="Posez votre question..."></textarea>
            <button id="send-btn" onclick="send()">
                <svg viewBox="0 0 24 24">
                    <path d="M2 21l21-9L2 3v7l15 2-15 2z" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000';

        window.onload = () => {
            addMsg('bot', 'Bonjour ! Je suis votre assistant médical pour Oujda.\n\nJe peux vous aider à :\n- 🏥 Trouver la pharmacie de garde\n- ❓ Répondre à vos questions de santé\n\n⚠️ Je ne donne pas de conseils sur les médicaments.');
        };

        function addMsg(role, text, cls) {
            const msgs = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            const av = document.createElement('div');
            av.className = 'avatar ' + (role === 'bot' ? 'bot-av' : 'user-av');
            av.textContent = role === 'bot' ? '🏥' : '👤';
            const bub = document.createElement('div');
            bub.className = 'bubble' + (cls ? ' ' + cls : '');
            bub.textContent = text;
            div.appendChild(av);
            div.appendChild(bub);
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function addPharmaCards(pharmacies, source) {
            const msgs = document.getElementById('messages');
            const wrapper = document.createElement('div');
            wrapper.className = 'msg bot';
            const av = document.createElement('div');
            av.className = 'avatar bot-av';
            av.textContent = '🏥';
            const col = document.createElement('div');
            col.style.cssText = 'display:flex;flex-direction:column;gap:8px;';

            // Badge source
            const badge = document.createElement('span');
            badge.className = 'source-badge ' + (source === 'live' ? 'source-live' : 'source-fallback');
            badge.textContent = source === 'live' ? '🟢 Données en temps réel' : '🟡 Données de secours';
            col.appendChild(badge);

            const intro = document.createElement('div');
            intro.className = 'bubble';
            intro.textContent = "Pharmacies de garde aujourd'hui à Oujda :";
            col.appendChild(intro);

            pharmacies.forEach(p => {
                const card = document.createElement('div');
                card.className = 'pharma-card';
                let linksHtml = '';
                if (p.maps) linksHtml += `<a class="maps" href="${p.maps}" target="_blank">🗺️ Maps</a>`;
                if (p.waze) linksHtml += `<a class="waze" href="${p.waze}" target="_blank">🚗 Waze</a>`;
                card.innerHTML = `
                <strong>🏥 ${p.name}</strong>
                <span>📍 ${p.address}</span>
                <span>📞 ${p.phone !== 'N/A' ? p.phone : 'Appeler pour confirmer'} — ${p.garde || '24h/24'}</span>
                ${linksHtml ? `<div class="pharma-links">${linksHtml}</div>` : ''}
            `;
                col.appendChild(card);
            });

            const note = document.createElement('div');
            note.style.cssText = 'font-size:11px;color:#6b7280;padding:4px 2px;';
            note.textContent = 'Appelez avant de vous déplacer. Urgence : 150';
            col.appendChild(note);

            wrapper.appendChild(av);
            wrapper.appendChild(col);
            msgs.appendChild(wrapper);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function showTyping() {
            const msgs = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg bot';
            div.id = 'typing';
            div.innerHTML = '<div class="avatar bot-av">🏥</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function hideTyping() {
            const t = document.getElementById('typing');
            if (t) t.remove();
        }

        async function send(preset) {
            const input = document.getElementById('user-input');
            const text = (preset || input.value).trim();
            if (!text) return;

            addMsg('user', text);
            input.value = '';
            input.style.height = '42px';
            document.getElementById('send-btn').disabled = true;

            const textLower = text.toLowerCase();
            const isPharmaQuery = textLower.includes('pharmacie') || textLower.includes('garde');

            showTyping();

            try {
                if (isPharmaQuery) {
                    // Appel direct à /api/pharmacies (scraping temps réel)
                    const res = await fetch(API + '/api/pharmacies');
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const data = await res.json();
                    hideTyping();

                    // Gère les deux formats : [] ou { source, data[] }
                    const liste = Array.isArray(data) ? data : (data.data || []);
                    const source = data.source || 'fallback';

                    if (liste.length > 0) {
                        addPharmaCards(liste, source);
                    } else {
                        addMsg('bot', 'Aucune pharmacie trouvée. Appelez le 150.', 'blocked');
                    }

                } else {
                    // Appel à /api/chat pour les questions de santé
                    const res = await fetch(API + '/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text })
                    });
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const data = await res.json();
                    hideTyping();

                    if (data.pharmacies) {
                        addPharmaCards(data.pharmacies, 'live');
                    } else {
                        const isBlocked = data.reply && data.reply.includes('autorisé');
                        addMsg('bot', data.reply || data.error || 'Erreur inconnue.', isBlocked ? 'blocked' : '');
                    }
                }

            } catch (e) {
                hideTyping();
                console.error('Erreur fetch:', e);
                addMsg('bot', 'Erreur de connexion au serveur.\nVérifiez que Flask tourne sur le port 8000.', 'blocked');
            }

            document.getElementById('send-btn').disabled = false;
        }

        document.getElementById('user-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
        });

        document.getElementById('user-input').addEventListener('input', function () {
            this.style.height = '42px';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
    </script>
</body>

</html>
